name: Sync Tiendanube Inventory -> Firestore

on:
  workflow_dispatch:
    inputs:
      storeId:
        description: "Store ID de Tiendanube (si vacío usa secret TIENDANUBE_STORE_ID)"
        required: false
        default: ""
        type: string
      dryRun:
        description: "true = solo logs, false = escribe en Firestore"
        required: true
        default: "false"
        type: choice
        options:
          - "true"
          - "false"

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Resolve storeId + dryRun
        id: vars
        run: |
          STORE_ID="${{ github.event.inputs.storeId }}"
          if [ -z "$STORE_ID" ]; then
            STORE_ID="${{ secrets.TIENDANUBE_STORE_ID }}"
          fi

          if [ -z "$STORE_ID" ]; then
            echo "ERROR: Missing storeId."
            exit 1
          fi

          DRY="${{ github.event.inputs.dryRun }}"
          if [ -z "$DRY" ]; then
            DRY="false"
          fi

          echo "storeId=$STORE_ID" >> $GITHUB_OUTPUT
          echo "dry=$DRY" >> $GITHUB_OUTPUT

      - name: Run inventory sync
        env:
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
          STORE_ID: ${{ steps.vars.outputs.storeId }}
          DRY: ${{ steps.vars.outputs.dry }}
        run: |
          echo "Running inventory sync..."
          echo "Project: $FIREBASE_PROJECT_ID"
          echo "Store:   $STORE_ID"
          echo "DryRun:  $DRY"

          node scripts/sync-tiendanube-inventory.mjs --storeId="$STORE_ID" --dry="$DRY"
