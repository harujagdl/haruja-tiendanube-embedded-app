name: Deploy Firebase (Hosting + Firestore + Functions)

on:
  push:
    branches: ["main"]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Firebase CLI
        run: npm i -g firebase-tools

      - name: Install functions dependencies
        working-directory: functions
        run: |
          if [ -f package-lock.json ]; then
            npm ci --omit=dev
          else
            npm install --omit=dev
          fi

      # Write Service Account JSON
      - name: Write service account
        run: |
          echo '${{ secrets.GCP_SA_KEY }}' > /tmp/serviceAccount.json
          node -e "JSON.parse(require('fs').readFileSync('/tmp/serviceAccount.json','utf8')); console.log('SA JSON OK')"

      # Debug info
      - name: Debug Firebase target project
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/serviceAccount.json
        run: |
          echo "Deploying to project: ${{ secrets.FIREBASE_PROJECT_ID }}"
          firebase projects:list || true

      # Deploy Hosting first
      - name: Deploy Hosting
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/serviceAccount.json
        run: |
          firebase deploy \
            --project "${{ secrets.FIREBASE_PROJECT_ID }}" \
            --only hosting \
            --non-interactive

      # Delete old function if exists (safe)
      - name: Delete old replicateAdminToPublic (if exists)
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/serviceAccount.json
        run: |
          set +e
          firebase functions:delete replicateAdminToPublic \
            --project "${{ secrets.FIREBASE_PROJECT_ID }}" \
            --region us-central1 \
            --force \
            --non-interactive
          echo "Delete step finished."
          set -e

      # ✅ Set Tiendanube secrets (ONLY the 2 required for OAuth)
      - name: Set Tiendanube secrets in Firebase
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/serviceAccount.json
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}

          TIENDANUBE_CLIENT_ID: ${{ secrets.TIENDANUBE_CLIENT_ID }}
          TIENDANUBE_CLIENT_SECRET: ${{ secrets.TIENDANUBE_CLIENT_SECRET }}

          PANEL_URL: ${{ secrets.PANEL_URL }}
          TIENDANUBE_REDIRECT_URI: ${{ secrets.TIENDANUBE_REDIRECT_URI }}
        run: |
          printf "%s" "$TIENDANUBE_CLIENT_ID" | firebase functions:secrets:set TIENDANUBE_CLIENT_ID --project "$FIREBASE_PROJECT_ID"
          printf "%s" "$TIENDANUBE_CLIENT_SECRET" | firebase functions:secrets:set TIENDANUBE_CLIENT_SECRET --project "$FIREBASE_PROJECT_ID"
          printf "%s" "$PANEL_URL" | firebase functions:secrets:set PANEL_URL --project "$FIREBASE_PROJECT_ID"
          printf "%s" "$TIENDANUBE_REDIRECT_URI" | firebase functions:secrets:set TIENDANUBE_REDIRECT_URI --project "$FIREBASE_PROJECT_ID"

      # Deploy Firestore rules + Functions
      - name: Deploy Firestore + Functions
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/serviceAccount.json
        run: |
          firebase deploy \
            --project "${{ secrets.FIREBASE_PROJECT_ID }}" \
            --only firestore:indexes,firestore:rules,functions \
            --force \
            --non-interactive

      - name: Run split migration (master -> public/admin)
        working-directory: functions
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/serviceAccount.json
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
        run: node scripts/run-migrate-split.cjs
