name: Deploy Firebase Functions

on:
  workflow_dispatch:

concurrency:
  group: firebase-functions-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write

jobs:
  functionsDeploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies (functions)
        working-directory: functions
        run: npm install --omit=dev

      - name: Auth to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
          create_credentials_file: true
          export_environment_variables: true

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.FIREBASE_PROJECT_ID }}

      - name: Show deploy identity
        run: |
          echo "Deploying with service account from GCP_SA_KEY"
          gcloud auth list --filter=status:ACTIVE --format='value(account)'

      - name: Ensure Firebase Extensions API is enabled
        run: gcloud services enable firebaseextensions.googleapis.com --project "${{ secrets.FIREBASE_PROJECT_ID }}"

      - name: Extensions list (non-blocking diagnostics)
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ steps.auth.outputs.credentials_file_path }}
        run: npx -y firebase-tools@latest ext:list --project "${{ secrets.FIREBASE_PROJECT_ID }}" --non-interactive || true

      - name: Deploy Functions
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ steps.auth.outputs.credentials_file_path }}
        run: |
          npx -y firebase-tools@latest --version
          npx -y firebase-tools@latest deploy --only functions --project "${{ secrets.FIREBASE_PROJECT_ID }}" --non-interactive
