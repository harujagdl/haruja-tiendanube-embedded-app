<!doctype html>
<html lang="es">
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Apartado | HarujaGDL</title><style>body{font-family:Inter,system-ui,sans-serif;background:#f7f7f8;margin:0;color:#111827}.wrap{max-width:840px;margin:24px auto;padding:0 16px}.card{background:#fff;border:1px solid #e5e7eb;border-radius:14px;padding:16px}.muted{color:#6b7280}.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}table{width:100%;border-collapse:collapse;margin-top:12px}th,td{border-bottom:1px solid #e5e7eb;padding:8px;text-align:left;font-size:14px}.right{text-align:right}</style></head>
<body><div class="wrap"><div class="card"><h2 id="title">Apartado</h2><p id="msg" class="muted">Cargando…</p><div id="content" style="display:none"><div class="grid"><div><b>Cliente:</b> <span id="cliente"></span></div><div><b>Teléfono:</b> <span id="telefono"></span></div><div><b>Fecha:</b> <span id="fecha"></span></div><div><b>Estatus:</b> <span id="status"></span></div><div><b>Fecha límite:</b> <span id="fechaLimite"></span></div><div><b>Saldo pendiente:</b> <span id="saldo"></span></div></div><table><thead><tr><th>Código</th><th>Descripción</th><th class="right">Precio</th></tr></thead><tbody id="rows"></tbody></table></div></div></div>
<script>const fmt=(n)=>(Number(n)||0).toLocaleString('es-MX',{style:'currency',currency:'MXN'});const pathParts=location.pathname.split('/').filter(Boolean);const qsFolio=new URLSearchParams(location.search).get('folio');const folioFromPath=pathParts[pathParts.length-1]&&pathParts[pathParts.length-1].toLowerCase()!=='index.html'?pathParts[pathParts.length-1]:'';const folio=decodeURIComponent((qsFolio||folioFromPath||'').trim().toUpperCase());const $=(id)=>document.getElementById(id);async function run(){if(!folio){$('msg').textContent='Folio inválido';return;}$('title').textContent=`Apartado ${folio}`;const res=await fetch(`/api/apartados/${encodeURIComponent(folio)}`);const data=await res.json().catch(()=>({}));if(!res.ok||data?.ok===false){$('msg').textContent=data?.error||'No encontrado';return;}const a=data.apartado||{};$('cliente').textContent=a.cliente||'';$('telefono').textContent=a.telefono||'';$('fecha').textContent=a.fecha||'';$('status').textContent=a.status||'';$('fechaLimite').textContent=a.fechaLimite||'';$('saldo').textContent=fmt(a.saldoPendiente);const rows=$('rows');(a.productos||[]).forEach((r)=>{const tr=document.createElement('tr');tr.innerHTML=`<td>${r.codigo||''}</td><td>${r.descripcion||''}</td><td class="right">${fmt(r.precio)}</td>`;rows.appendChild(tr);});$('content').style.display='block';$('msg').textContent='';}run().catch((e)=>{$('msg').textContent=e.message||'Error';});</script></body></html>
