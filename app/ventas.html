<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Ventas & Comisiones | Haruja</title>
  <style>
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; margin: 0; background: #f6f7fb; color: #111827; }
    .wrap { max-width: 1100px; margin: 24px auto; padding: 0 16px; }
    .toplink { display:inline-block; margin-bottom: 8px; color:#2563eb; text-decoration:none; font-size:14px; }
    .card { background:#fff; border-radius:16px; box-shadow: 0 10px 30px rgba(0,0,0,0.06); padding: 18px; }
    h1 { margin: 0 0 12px; font-size: 34px; }
    .controls { display:flex; gap: 12px; flex-wrap: wrap; align-items: end; }
    .field { display:flex; flex-direction:column; gap: 6px; }
    .field label { font-size: 12px; color:#6b7280; }
    input, select { padding: 10px 12px; border-radius: 10px; border:1px solid #e5e7eb; font-size:14px; background:#fff; }
    input.readonly { background:#f3f4f6; color:#111827; }
    button { padding: 10px 14px; border-radius: 12px; border: none; font-weight: 600; cursor:pointer; }
    .btn-primary { background:#2563eb; color:#fff; }
    .btn-primary:hover { background:#1d4ed8; }
    .btn-secondary { background:#e5e7eb; color:#111827; }
    .btn-secondary:hover { background:#d1d5db; }
    .status { margin-top: 8px; font-size: 13px; color:#6b7280; min-height: 18px; }
    .stats { display:grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-top: 14px; }
    .stat { background:#f8fafc; border: 1px solid #e5e7eb; border-radius: 14px; padding: 12px; }
    .stat .label { font-size: 12px; color:#6b7280; }
    .stat .value { font-size: 18px; font-weight: 800; margin-top: 2px; }
    .tableWrap { margin-top: 14px; }
    table { width:100%; border-collapse: collapse; font-size: 13px; background:#fff; border-radius: 16px; overflow:hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.06); }
    th, td { padding: 12px 12px; border-bottom: 1px solid #e5e7eb; text-align:left; vertical-align: middle; }
    th { color:#6b7280; font-weight: 700; font-size: 12px; background:#ffffff; }
    tr:last-child td { border-bottom:none; }
    td select { width: 160px; }
    @media (max-width: 820px) {
      .stats { grid-template-columns: 1fr; }
      td select { width: 140px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <a class="toplink" href="#/panel">← Volver al panel</a>

    <div class="card">
      <h1>Ventas & Comisiones</h1>

      <div class="controls">
        <div class="field">
          <label for="storeId">Store ID Tiendanube</label>
          <input id="storeId" placeholder="Ej. 6432936" />
        </div>

        <div class="field">
          <label for="month">Mes</label>
          <input id="month" type="month" />
        </div>

        <button id="btnLoad" class="btn-primary">Actualizar</button>
        <button id="btnCsv" class="btn-secondary">Export CSV</button>
      </div>

      <div id="status" class="status"></div>
    </div>

    <div class="stats">
      <div class="stat">
        <div class="label">Total del mes</div>
        <div id="totalMes" class="value">—</div>
      </div>
      <div class="stat">
        <div class="label">Total por vendedora</div>
        <div id="topSeller" class="value">—</div>
      </div>
      <div class="stat">
        <div class="label">Sin asignar</div>
        <div id="sinAsignar" class="value">—</div>
      </div>
    </div>

    <div class="tableWrap">
      <table>
        <thead>
          <tr>
            <th>Fecha</th>
            <th>Order ID</th>
            <th>Cliente</th>
            <th>Total pagado</th>
            <th>Estado</th>
            <th>Vendedora</th>
          </tr>
        </thead>
        <tbody id="tbody">
          <tr><td colspan="6">Cargando...</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <script>
    const moneyMx = new Intl.NumberFormat("es-MX", { style: "currency", currency: "MXN", maximumFractionDigits: 2 });

    const storeIdInput = document.getElementById("storeId");
    const monthInput = document.getElementById("month");
    const statusEl = document.getElementById("status");
    const tbody = document.getElementById("tbody");

    const totalMesEl = document.getElementById("totalMes");
    const topSellerEl = document.getElementById("topSeller");
    const sinAsignarEl = document.getElementById("sinAsignar");

    // ✅ FIX: Store ID fijo (Haruja = 1 tienda)
    // OJO: 6432936 es el Store ID (user_id) de Tiendanube, NO el App ID.
    const FIXED_STORE_ID = "6432936";

    // ✅ Solo estas 2 opciones (como pediste)
    const sellers = ["Vendedora", "Haru"];

    const setStatus = (txt="") => statusEl.textContent = txt;

    const safeJson = async (res) => {
      const ct = (res.headers.get("content-type") || "").toLowerCase();
      if (!ct.includes("application/json")) {
        const txt = await res.text();
        throw new Error(`API no regresó JSON. HTTP ${res.status}. Recibí: ${txt.slice(0,60)}...`);
      }
      return res.json();
    };

    // ✅ FIX: evita "Invalid Date"
    const formatFecha = (value) => {
      if (!value) return "—";
      const d = (value instanceof Date) ? value : new Date(value);
      if (Number.isNaN(d.getTime())) {
        // soporte simple para YYYY-MM-DD
        if (typeof value === "string" && /^\d{4}-\d{2}-\d{2}$/.test(value.trim())) {
          const d2 = new Date(value.trim() + "T00:00:00");
          if (!Number.isNaN(d2.getTime())) return d2.toLocaleDateString("es-MX");
        }
        return "—";
      }
      return d.toLocaleDateString("es-MX");
    };

    const sellerSelect = (selected="") => {
      const options = ["", ...sellers]
        .map((name) => `<option value="${name}" ${name===selected?"selected":""}>${name || "Sin asignar"}</option>`)
        .join("");
      return `<select data-seller>${options}</select>`;
    };

    const loadData = async () => {
      const storeId = storeIdInput.value.trim();
      const month = monthInput.value;

      if (!storeId) return setStatus("No hay storeId configurado.");

      setStatus("Cargando ventas...");
      tbody.innerHTML = "";

      try {
        const url = new URL("/dashboard/sales-details", location.origin);
        url.searchParams.set("storeId", storeId);
        if (month) url.searchParams.set("month", month);

        const res = await fetch(url.toString(), { method: "GET" });
        const data = await safeJson(res);

        if (!res.ok || !data?.ok) {
          throw new Error(data?.error || "Error al cargar ventas.");
        }

        const rows = Array.isArray(data.rows) ? data.rows : [];
        const summary = data.summary || {};

        totalMesEl.textContent = moneyMx.format(summary.totalMes || 0);
        const top = (summary.totalPorVendedora || [])[0];
        topSellerEl.textContent = top ? `${top.seller}: ${moneyMx.format(top.total || 0)}` : "Sin asignaciones";
        sinAsignarEl.textContent = moneyMx.format(summary.totalSinAsignar || 0);

        if (!rows.length) {
          tbody.innerHTML = '<tr><td colspan="6">No hay ventas pagadas para este mes.</td></tr>';
        } else {
          tbody.innerHTML = rows.map((row) => `
            <tr data-order-id="${row.orderId}">
              <td>${formatFecha(row.fecha)}</td>
              <td>${row.orderId}</td>
              <td>${row.cliente || "—"}</td>
              <td>${moneyMx.format(row.totalPagado || 0)}</td>
              <td>${row.estado || "—"}</td>
              <td>${sellerSelect(row.seller || "")}</td>
            </tr>
          `).join("");
        }

        setStatus(`Listo. ${rows.length} pedidos cargados.`);
      } catch (error) {
        console.error(error);
        setStatus(`Error al cargar ventas: ${error.message || error}`);
        tbody.innerHTML = '<tr><td colspan="6">Error cargando ventas.</td></tr>';
      }
    };

    const exportCsv = async () => {
      const storeId = storeIdInput.value.trim();
      const month = monthInput.value;
      if (!storeId) return setStatus("No hay storeId configurado.");

      try {
        const url = new URL("/dashboard/sales-csv", location.origin);
        url.searchParams.set("storeId", storeId);
        if (month) url.searchParams.set("month", month);

        const res = await fetch(url.toString(), { method: "GET" });
        if (!res.ok) {
          const txt = await res.text();
          throw new Error(txt || `HTTP ${res.status}`);
        }
        const blob = await res.blob();
        const a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = `ventas-comisiones-${month || "mes"}.csv`;
        document.body.appendChild(a);
        a.click();
        a.remove();
        setStatus("CSV descargado.");
      } catch (e) {
        console.error(e);
        setStatus(`No se pudo exportar CSV: ${e.message || e}`);
      }
    };

    // ✅ Init: storeId fijo + readonly
    storeIdInput.value = FIXED_STORE_ID;
    storeIdInput.readOnly = true;
    storeIdInput.classList.add("readonly");
    // Persistimos por compat (por si otra parte lo lee)
    localStorage.setItem("haruja_tn_store_id", FIXED_STORE_ID);

    // Mes default: mes actual
    const now = new Date();
    monthInput.value = now.toISOString().slice(0,7);

    document.getElementById("btnLoad").addEventListener("click", loadData);
    document.getElementById("btnCsv").addEventListener("click", exportCsv);

    // auto load
    loadData();
  </script>
</body>
</html>
